function formatDate(iso) {
  return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

function stripHtml(html) {
  const d = document.createElement('div');
  d.innerHTML = html;

function pad(n) { return String(n).padStart(2, '0'); }

/* ─── App ─────────────────────────────────────────────────────────── */
function App() {
  const [briefs, setBriefs]         = useState([]);
  const [loading, setLoading]       = useState(true);
  const [error, setError]           = useState(null);
  const [page, setPage]             = useState(1);
  const [totalBriefs, setTotalBriefs] = useState(0);
  const catIdRef = useRef(null);
  const PER_PAGE = 6;
  const [active, setActive]         = useState(null);
  const [tab, setTab]               = useState('summary');
  const [fullHtml, setFullHtml]     = useState('');
  const [loadingFull, setLoadingFull] = useState(false);
  const [email, setEmail]           = useState('');
  const [subbed, setSubbed]         = useState(false);
  const [busy, setBusy]             = useState(false);
  const wrapRef = useRef(null);

  /* iframe resize */
  useEffect(() => {
    const ro = new ResizeObserver(() => {
      const h = wrapRef.current?.offsetHeight ?? 0;
      window.parent.postMessage({ type: 'X-resize', height: h }, '*');
    });
    if (wrapRef.current) ro.observe(wrapRef.current);
    return () => ro.disconnect();
  }, []);

  /* Fetch brief list — re-runs when page changes */
  useEffect(() => {
    (async () => {
      setLoading(true);
      try {
        /* Get category ID once and cache it */
        if (!catIdRef.current) {
          const catRes = await fetch(`${SITE}/wp-json/wp/v2/categories?slug=${CAT_SLUG}`);
          const cats   = await catRes.json();
          if (!cats.length) throw new Error();
          catIdRef.current = cats[0].id;
        }
        const postsRes = await fetch(
          `${SITE}/wp-json/wp/v2/posts?categories=${catIdRef.current}` +
          `&per_page=${PER_PAGE}&page=${page}&orderby=date&order=desc` +
          `&_fields=id,slug,title,date,link,excerpt`
        );
        const total = parseInt(postsRes.headers.get('X-WP-Total') ?? '0', 10);
        setTotalBriefs(total);
        setBriefs(await postsRes.json());
      } catch {
        setError('Briefs could not be loaded.');
      } finally {
        setLoading(false);
      }
    })();
  }, [page]);

  /* Fetch full brief content */
  const fetchFull = async (slug) => {
    if (fullHtml || loadingFull) return;
    setLoadingFull(true);
    try {
      const res  = await fetch(`${SITE}/wp-json/wp/v2/posts?slug=${slug}&_fields=content`);
      const data = await res.json();
      setFullHtml(data[0]?.content?.rendered ?? '<p>Content unavailable.</p>');
    } catch {
      setFullHtml('<p>Content could not be loaded.</p>');
    }
    setLoadingFull(false);
  };

  /* Open brief—initialTab controls which tab opens first */
  const openBrief = (brief, initialTab) => {
    const hasSummary = !!(CURATED[brief.slug]?.summary);
    const startTab   = initialTab ?? (hasSummary ? 'summary' : 'full');
    setActive(brief);
    setTab(startTab);
    setFullHtml('');
    setEmail('');
    setSubbed(false);
    /* If opening on full tab, fetch immediately */
    if (startTab === 'full') {
      setLoadingFull(true);
      fetch(`${SITE}/wp-json/wp/v2/posts?slug=${brief.slug}&_fields=content`)
        .then(r => r.json())
        .then(d => { setFullHtml(d[0]?.content?.rendered ?? '<p>Content unavailable.</p>'); })
        .catch(() => { setFullHtml('<p>Content could not be loaded.</p>'); })
        .finally(() => setLoadingFull(false));
    }
  };

  const switchTab = (t) => {
    setTab(t);
    if (t === 'full') fetchFull(active?.slug);
  };

  const closeBrief = () => { setActive(null); setFullHtml(''); };

  const handleSub = async (e) => {
    e.preventDefault();
    if (!email.trim() || busy) return;
    setBusy(true);
    try {
      await fetch(WEBHOOK, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: email.trim(), source: 'briefs' }),
      });
    } catch {}
    setSubbed(true);
    setBusy(false);
  };

  return (
    <>
      <style dangerouslySetInnerHTML={{ __html: S }} />
      <div ref={wrapRef} className="wrap">
        {active ? (
          <Overlay
            brief={active}
            tab={tab}
            onTab={switchTab}
            onClose={closeBrief}
            fullHtml={fullHtml}
            loadingFull={loadingFull}
            email={email}
            setEmail={setEmail}
            subbed={subbed}
            busy={busy}
            onSub={handleSub}
          />
        ) : (
          <ListView
            briefs={briefs}
            loading={loading}
            error={error}
            page={page}
            totalBriefs={totalBriefs}
            perPage={PER_PAGE}
            onPage={p => { setPage(p); setActive(null); }}
            onOpenSummary={b => openBrief(b, 'summary')}
            onOpenFull={b    => openBrief(b, 'full')}
          />
        )}
      </div>
    </>
  );
}

function ListView({ briefs, loading, error, page, totalBriefs, perPage, onPage, onOpenSummary, onOpenFull }) {
  const totalPages  = Math.ceil(totalBriefs / perPage);
  const [expandedId, setExpandedId] = useState(null);
  const toggleRow = (id) => setExpandedId(prev => prev === id ? null : id);
  /* Brief 01 = oldest ever published; number persists across pages.
     API returns newest-first, so position i on page p maps to:
     absoluteNumber = totalBriefs - ((page-1)*perPage + i)        */
  const briefNum = (i) => pad(Math.max(1, totalBriefs - ((page - 1) * perPage + i)));
  return (
    <div className="list-layout">
      <div className="left-col">
        <p className="left-label">What If Love</p>
        <h2 className="left-heading">Co-Intelligence<br />Briefs</h2>
        {!loading && !error && briefs.length > 0 && (
          <p className="left-count">{briefs.length} published</p>
        )}
        <p className="left-desc">
          Co-Intelligence. Design-led AI Governance. The Future of Learning Systems.
        </p>
      </div>
      <div className="right-col">
        {loading && (
          <div className="loading-row"><div className="spinner" /> Loading</div>
        )}
        {error && (
          <div className="loading-row" style={{ color: '#C0442C' }}>{error}</div>
        )}
        {!loading && !error && briefs.map((b, i) => {
          const curated    = CURATED[b.slug] ?? null;
          const thesis     = curated?.thesis
            ?? (stripHtml(b.excerpt?.rendered ?? '').slice(0, 160).trim() + '\u2026');
          const hasSummary = !!(curated?.summary);
          return (
            <div
              key={b.id}
              className={`brief-row${expandedId === b.id ? ' is-open' : ''}`}
              onClick={() => toggleRow(b.id)}
              style={{cursor: 'pointer'}}
            >
              <div className="row-top">
                <span className="b-num">{briefNum(i)}</span>
                <div className="b-right">
                  <p className="b-title" dangerouslySetInnerHTML={{ __html: b.title.rendered }} />
                  <p className="b-date">{formatDate(b.date)}</p>
                </div>
              </div>
              <div className="thesis-wrap">
                <p className="thesis-text">{thesis}</p>
                <div className="actions">
                  {hasSummary && (
                    <button className="act-btn" onClick={() => onOpenSummary(b)}>
                      Executive summary
                    </button>
                  )}
                  <button
                    className={`act-btn${hasSummary ? ' act-sec' : ''}`}
                    onClick={() => onOpenFull(b)}
                  >
                    Read brief →
                  </button>
                </div>
              </div>
            </div>
          );
        })}
      </div>

      {/* Pagination — only rendered when > 1 page exists */}
      {!loading && !error && totalPages > 1 && (
        <div className="page-nav">
          {page < totalPages ? (
            <button className="nav-btn" onClick={() => onPage(page + 1)}>← Older</button>
          ) : <span />}
          <span className="nav-spacer" />
          {page > 1 && (
            <button className="nav-btn" onClick={() => onPage(page - 1)}>Newer →</button>
          )}
        </div>
      )}
    </div>
  );
}

/* ─── Overlay ─────────────────────────────────────────────────────── */
function Overlay({ brief, tab, onTab, onClose, fullHtml, loadingFull, email, setEmail, subbed, busy, onSub }) {
  const curated    = CURATED[brief.slug] ?? null;
  const thesis     = curated?.thesis ?? stripHtml(brief.excerpt?.rendered ?? '');
  const hasSummary = !!(curated?.summary);

  return (
    <div className="overlay">
      <button className="back-btn" onClick={onClose}>← All briefs</button>

      {hasSummary && (
        <div className="tabs">
          <button className={`tab ${tab === 'summary' ? 'active' : ''}`} onClick={() => onTab('summary')}>
            Executive summary
          </button>
          <button className={`tab ${tab === 'full' ? 'active' : ''}`} onClick={() => onTab('full')}>
            Full brief
          </button>
        </div>
      )}

      <p className="o-label">Co-Intelligence Brief</p>
      <h2 className="o-title" dangerouslySetInnerHTML={{ __html: brief.title.rendered }} />
      <div className="o-rule" />
      <p className="o-thesis">{thesis}</p>

      {tab === 'summary' && hasSummary && (
        <div className="o-body reading-body">
          {curated.summary.map((p, i) => <p key={i}>{p}</p>)}
        </div>
      )}

      {tab === 'full' && (
        loadingFull
          ? <div className="full-loading"><div className="spinner" /> Loading full brief</div>
          : <div className="wp-body reading-body" dangerouslySetInnerHTML={{ __html: fullHtml }} />
      )}

      <div className="sub-block">
        <p className="sub-lede">New briefs when they publish.</p>
        <p className="sub-note">No account. Unsubscribe any time.</p>
        {subbed ? (
          <p className="sub-ok">Subscribed.</p>
        ) : (
          <form className="sub-form" onSubmit={onSub}>
            <input
              className="sub-input"
              type="email"
              placeholder="Your email"
              value={email}
              onChange={e => setEmail(e.target.value)}
              required
            />
            <button className="sub-btn" type="submit" disabled={busy}>
              {busy ? 'Subscribing...' : 'Subscribe'}
            </button>
          </form>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
